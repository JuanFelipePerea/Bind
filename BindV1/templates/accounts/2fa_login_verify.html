{% extends 'base.html' %}
{% block title %}BIND - Verificación{% endblock %}
{% block page_title %}Verificación en 2 pasos{% endblock %}

{% block content %}
<div class="p-6 md:p-8 max-w-md mx-auto animate-fade-in">

  <div class="glass rounded-2xl p-8 border border-gray-100 dark:border-gray-700 text-center">
    <div class="w-20 h-20 rounded-full bg-gradient-to-br from-teal-400 to-cyan-500 flex items-center justify-center mx-auto mb-4 shadow-lg">
      <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
    </div>

    <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-2">Código de seguridad</h2>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Ingresa el código de 6 dígitos enviado a tu email</p>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <input type="text" name="code" maxlength="6" pattern="[0-9]{6}" placeholder="000000" required
               class="w-full px-4 py-3 rounded-xl bg-white/70 dark:bg-gray-700/60 border border-gray-200 dark:border-gray-600
                      focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 outline-none text-center text-2xl tracking-widest font-mono transition-all">
      </div>
      <button type="submit"
              class="w-full px-6 py-3 bg-gradient-to-r from-teal-500 to-cyan-500 hover:from-teal-600 hover:to-cyan-600
                     text-white rounded-xl text-sm font-bold shadow-md shadow-teal-500/30 transition-all">
        Ingresar
      </button>
    </form>

    <div class="mt-6 flex flex-col gap-2">
      <a href="{% url 'accounts:login' %}" class="text-xs text-gray-500 hover:underline">Volver al login</a>
    </div>
  </div>

</div>
{% endblock %}
