<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{% block subject %}BIND{% endblock %}</title>
  <!--[if mso]>
  <noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
  <![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;">

  <!-- Wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f1f5f9;padding:40px 16px;">
    <tr>
      <td align="center">
        <!-- Card -->
        <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#134e4a 100%);padding:36px 40px 32px;text-align:center;">
              <!-- Logo / Wordmark -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center">
                    <!-- Logo mark -->
                    <table cellpadding="0" cellspacing="0" border="0" style="display:inline-table;">
                      <tr>
                        <td style="background-color:#14b8a6;width:40px;height:40px;border-radius:10px;text-align:center;vertical-align:middle;font-size:22px;font-weight:900;color:#ffffff;letter-spacing:-1px;">
                          B
                        </td>
                        <td style="width:12px;"></td>
                        <td style="vertical-align:middle;">
                          <span style="font-size:26px;font-weight:800;color:#ffffff;letter-spacing:-0.5px;">BIND</span>
                        </td>
                      </tr>
                    </table>
                    <p style="margin:8px 0 0;font-size:12px;color:#94a3b8;letter-spacing:2px;text-transform:uppercase;">Gestión de Eventos</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Colored accent bar -->
          <tr>
            <td style="background:linear-gradient(90deg,#14b8a6,#0d9488,#0891b2);height:3px;font-size:0;line-height:0;">&nbsp;</td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px 40px 32px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#f8fafc;border-top:1px solid #e2e8f0;padding:24px 40px;text-align:center;">
              <p style="margin:0 0 6px;font-size:12px;color:#94a3b8;">Este correo fue enviado automáticamente por <strong style="color:#64748b;">BIND</strong>.</p>
              <p style="margin:0;font-size:12px;color:#cbd5e1;">
                <a href="{{ site_url }}" style="color:#14b8a6;text-decoration:none;">{{ site_url }}</a>
                &nbsp;·&nbsp;
                Powered by <strong style="color:#64748b;">Bynix AI</strong>
              </p>
            </td>
          </tr>

        </table>
        <!-- /Card -->

      </td>
    </tr>
  </table>

</body>
</html>
