<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BIND — Error del servidor</title>
  <script>
    (() => {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const dark = saved === 'dark' || (!saved && prefersDark);
      if (dark) {
        document.documentElement.classList.add('dark');
        document.documentElement.style.background = '#09090b';
      } else {
        document.documentElement.style.background = '#fafafa';
      }
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #18181b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .dark body { background: #09090b; color: #fafafa; }
    .card {
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .code {
      font-size: 5rem;
      font-weight: 900;
      color: #e4e4e7;
      line-height: 1;
      margin-bottom: 0.5rem;
      user-select: none;
    }
    .dark .code { color: #27272a; }
    h1 { font-size: 1.375rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #71717a; margin-bottom: 2rem; line-height: 1.6; }
    .btn {
      display: inline-block;
      padding: 0.625rem 1.25rem;
      border-radius: 0.75rem;
      font-weight: 600;
      font-size: 0.875rem;
      text-decoration: none;
      transition: opacity 0.15s;
      background: #14b8a6;
      color: #fff;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">500</div>
    <h1>Error del servidor</h1>
    <p>Algo falló en nuestro lado. Ya estamos al tanto.<br>Intenta de nuevo en unos momentos.</p>
    <a href="/" class="btn">Ir al inicio</a>
  </div>
</body>
</html>
