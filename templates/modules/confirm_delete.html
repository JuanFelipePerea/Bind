{% extends "base.html" %}
{% block title %}BIND - Eliminar{% endblock %}
{% block page_title %}Confirmar eliminación{% endblock %}

{% block content %}
<div class="p-6 md:p-8 max-w-lg mx-auto animate-fade-in">
  <div class="glass rounded-3xl p-8 border border-red-100 dark:border-red-900/30 text-center">

    <!-- Icono de advertencia -->
    <div class="w-20 h-20 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.998L13.732 5c-.77-1.333-2.694-1.333-3.464 0L3.34 16.002c-.77 1.331.192 2.998 1.732 2.998z"/>
      </svg>
    </div>

    <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-3">¿Eliminar {{ object_name|default:"este elemento" }}?</h2>
    <p class="text-gray-500 dark:text-gray-400 mb-8">Esta acción no se puede deshacer.</p>

    <form method="post" class="flex gap-3 justify-center">
      {% csrf_token %}
      <button type="submit"
        class="px-8 py-3 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-xl shadow-lg transition-all hover:scale-[1.02]">
        Sí, eliminar
      </button>
      <a href="{{ cancel_url|default:'javascript:history.back()' }}"
         class="px-8 py-3 glass hover:bg-white/80 dark:hover:bg-gray-700 rounded-xl font-medium text-gray-700 dark:text-gray-300 transition-all">
        Cancelar
      </a>
    </form>

  </div>
</div>
{% endblock %}
