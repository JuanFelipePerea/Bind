{% extends "base.html" %}
{% block title %}BIND - Eliminar{% endblock %}
{% block page_title %}Confirmar eliminación{% endblock %}

{% block content %}
<div class="p-6 md:p-8 max-w-md mx-auto animate-fade-in">
  <div class="bg-white dark:bg-zinc-900 rounded-xl border border-red-200 dark:border-red-900/40 shadow-sm text-center p-8">

    <!-- Ícono de advertencia -->
    <div class="w-16 h-16 rounded-2xl bg-red-50 dark:bg-red-900/20 flex items-center justify-center mx-auto mb-5 border border-red-200 dark:border-red-800/40">
      <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.998L13.732 5c-.77-1.333-2.694-1.333-3.464 0L3.34 16.002c-.77 1.331.192 2.998 1.732 2.998z"/>
      </svg>
    </div>

    <h2 class="text-xl font-bold text-zinc-900 dark:text-zinc-50 mb-2">
      ¿Eliminar <span class="text-red-600 dark:text-red-400">{{ object_name|default:"este elemento" }}</span>?
    </h2>
    <p class="text-sm text-zinc-500 dark:text-zinc-400 mb-7">Esta acción no se puede deshacer.</p>

    <form method="post" class="flex gap-3 justify-center">
      {% csrf_token %}
      <button type="submit"
        class="px-6 py-2.5 bg-red-500 hover:bg-red-600 active:bg-red-700 text-white font-semibold rounded-lg shadow-sm text-sm transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 dark:focus:ring-offset-zinc-900">
        Sí, eliminar
      </button>
      <a href="{{ cancel_url|default:'javascript:history.back()' }}"
         class="px-6 py-2.5 bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700
                hover:bg-zinc-50 dark:hover:bg-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-600
                rounded-lg font-medium text-sm text-zinc-600 dark:text-zinc-300 transition-all duration-150
                focus:outline-none focus:ring-2 focus:ring-zinc-500/40">
        Cancelar
      </a>
    </form>

  </div>
</div>
{% endblock %}
