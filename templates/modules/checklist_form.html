{% extends "base.html" %}
{% block title %}BIND - Nueva Checklist{% endblock %}
{% block page_title %}Nueva Checklist{% endblock %}

{% block content %}
<div class="p-6 md:p-8 max-w-2xl mx-auto animate-fade-in">
  <div class="glass rounded-3xl p-8 border border-gray-100 dark:border-gray-700">
    <a href="{% url 'modules:checklist_list' event.pk %}" class="flex items-center gap-2 text-sm text-gray-500 hover:text-teal-500 mb-6 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Volver a checklists
    </a>
    <form method="post" class="space-y-5">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Título <span class="text-red-400">*</span></label>
        <input type="text" name="title" required value="{{ form.title.value|default:'' }}" placeholder="Ej: Lista de materiales"
          class="w-full px-4 py-3 rounded-xl bg-white/70 dark:bg-gray-800/70 border border-gray-200 dark:border-gray-700 focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 outline-none text-sm text-gray-800 dark:text-white placeholder-gray-400 transition-all">
      </div>
      <div class="flex gap-3 pt-4 border-t border-gray-200 dark:border-gray-700">
        <button type="submit" class="flex-1 bg-gradient-to-r from-teal-500 to-cyan-500 hover:from-teal-400 hover:to-cyan-400 text-white py-3 rounded-xl font-semibold shadow-lg transition-all">
          Crear checklist
        </button>
        <a href="{% url 'modules:checklist_list' event.pk %}" class="px-6 py-3 rounded-xl glass hover:bg-white/80 dark:hover:bg-gray-700 transition-all font-medium text-gray-700 dark:text-gray-300">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
